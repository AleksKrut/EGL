<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сетка турнира | Double Elimination</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: #121212;
      color: #e8e8e8;
      min-height: 100vh;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid #2a2a2a;
      background: #161616;
      flex-wrap: wrap;
    }
    .toolbar-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin-right: auto;
    }
    .btn-schedule {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #3d3d3d;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn-schedule:hover { background: #282828; border-color: #555; }
    .btn-schedule.active { background: #2a2a2a; border-color: #777; color: #fff; }
    .btn-schedule svg { width: 14px; height: 14px; opacity: 0.85; }
    .toolbar-meta {
      font-size: 0.8rem;
      color: #888;
    }
    .toolbar-actions { display: flex; align-items: center; gap: 10px; }
    .badge-admin {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 4px;
      background: #2d4a2d;
      color: #a8e6a8;
    }
    button.ghost {
      background: #2a2a2a;
      border: 1px solid #3d3d3d;
      color: #ddd;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    button.ghost:hover { background: #363636; }
    .viewport {
      position: relative;
      overflow-x: auto;
      overflow-y: visible;
      padding: 24px 20px 48px;
      min-height: calc(100vh - 56px);
    }
    .schedule-wrap { max-width: 1100px; margin: 0 auto; }
    .schedule-wrap.hidden { display: none; }
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .schedule-table th, .schedule-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #2a2a2a;
    }
    .schedule-table th { color: #888; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .schedule-row { cursor: pointer; }
    .schedule-row:hover { background: #1c1c1c; }
    .bracket-wrap { position: relative; display: block; }
    .bracket-wrap.hidden { display: none; }
    .bracket-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .bracket-inner {
      position: relative;
      z-index: 1;
      width: max-content;
      min-width: 100%;
      padding-bottom: 24px;
    }
    .bracket-se-grid {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 20px;
      padding: 8px 4px 24px;
      min-width: min-content;
    }
    .bracket-se-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 142px;
    }
    .bracket-liquid {
      display: grid;
      grid-template-columns: 142px 142px 142px 142px 158px;
      grid-template-rows: auto auto;
      column-gap: 26px;
      row-gap: 34px;
      align-items: start;
    }
    .bracket-cell {
      min-width: 0;
    }
    .bracket-cell.gf-bracket-cell {
      align-self: center;
    }
    .bracket-cell--ub-gap {
      pointer-events: none;
    }
    .round-col {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      flex-shrink: 0;
    }
    .round-title {
      text-align: center;
      font-size: 0.58rem;
      font-weight: 600;
      color: #b0b0b0;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 4px 5px;
      margin-bottom: 8px;
      text-transform: none;
      letter-spacing: 0.02em;
    }
    .match-stack {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      flex: 1;
      gap: 0;
    }
    .match-spacer { flex-shrink: 0; }
    .match {
      background: #1a1a1a;
      border: 1px solid #2f2f2f;
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .match:hover { border-color: #505050; background: #202020; }
    .match.gf-match { border-color: #3a3a3a; min-height: auto; }
    .team-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 5px;
      min-height: 24px;
      font-size: 0.68rem;
    }
    .team-row + .team-row { border-top: 1px solid #252525; }
    .team-row.winner .team-name { color: #fff; font-weight: 600; }
    .team-row:not(.winner) .team-name { color: #7a7a7a; }
    .team-logo {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #3a3a5a, #2a2a3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: 700;
      color: #ccc;
    }
    .team-name {
      flex: 1;
      min-width: 0;
      line-height: 1.2;
      word-break: break-word;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .team-score {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: #ccc;
      min-width: 18px;
      text-align: center;
      background: #242424;
      border-radius: 2px;
      padding: 1px 4px;
      margin-left: 2px;
      font-size: 0.65rem;
    }
    .team-row.winner .team-score { color: #fff; }
    .match-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 15px;
      background: #151515;
      border-top: 1px solid #252525;
      border-bottom: 1px solid #252525;
    }
    .info-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid #444;
      color: #888;
      font-size: 0.55rem;
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      background: #1e1e1e;
    }
    .info-dot:hover { color: #ccc; border-color: #666; }
    .empty-hint {
      text-align: center;
      padding: 48px 20px;
      color: #666;
      font-size: 0.9rem;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.45;
    }
    .admin-dock {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: min(440px, calc(100vw - 32px));
      max-width: calc(100vw - 32px);
      max-height: 88vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #141414;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 0;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    }
    .admin-dock.hidden { display: none; }
    .admin-dock-head {
      padding: 12px 14px;
      border-bottom: 1px solid #2a2a2a;
      font-weight: 700;
      font-size: 0.9rem;
      color: #fff;
      flex-shrink: 0;
    }
    .admin-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid #2a2a2a;
      background: #181818;
      flex-shrink: 0;
    }
    .admin-tab {
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: #aaa;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .admin-tab:hover { color: #eee; background: #252525; }
    .admin-tab.active {
      color: #fff;
      background: #2a2020;
      border-color: #7c1212;
    }
    .admin-dock-body {
      overflow-y: auto;
      padding: 12px 14px 16px;
      flex: 1;
      min-height: 0;
    }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .admin-dock h4 { font-size: 0.82rem; margin: 0 0 10px; color: #bbb; }
    .admin-dock .team-form { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .admin-dock .team-form #players-container { flex: 1 1 100%; min-width: 0; }
    .admin-dock input, .admin-dock select {
      background: #252525;
      border: 1px solid #3a3a3a;
      color: #eee;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .admin-dock .team-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: #222;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }
    .delete-team { background: #5a2222; border: none; color: #faa; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    .format-settings { margin-top: 12px; padding-top: 10px; border-top: 1px solid #333; font-size: 0.75rem; }
    .format-row { display: flex; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal-content {
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      overflow-y: auto;
    }
    .modal-content.modal-liquipedia {
      width: 680px;
      max-width: 96%;
      max-height: 90vh;
      padding: 16px 18px;
    }
    .md-head-date {
      font-size: 0.8rem;
      color: #9a9a9a;
      margin-bottom: 10px;
    }
    .md-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .md-team-block { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 120px; }
    .md-team-block.right { flex-direction: row-reverse; text-align: right; }
    .md-big-score { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.06em; }
    .md-bo { font-size: 0.75rem; color: #888; }
    .md-game-row {
      display: grid;
      grid-template-columns: 28px 1fr auto 1fr 28px;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.78rem;
    }
    .md-heroes { display: flex; gap: 2px; flex-wrap: wrap; justify-content: flex-end; }
    .md-heroes.left { justify-content: flex-start; }
    .md-heroes.right { justify-content: flex-end; }
    .hero-icon-img {
      width: 26px;
      height: 26px;
      border-radius: 3px;
      object-fit: cover;
      border: 1px solid #333;
      background: #111;
    }
    .hero-icon-img.hero-icon-broken { opacity: 0.35; }
    .hero-slot-empty {
      display: inline-block;
      width: 26px;
      height: 26px;
      border-radius: 3px;
      border: 1px dashed #444;
      background: #1a1a1a;
      vertical-align: middle;
    }
    .wl-badge {
      width: 22px;
      height: 22px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.65rem;
    }
    .wl-w { background: #1e4d2a; color: #8fef9a; }
    .wl-l { background: #4d1e1e; color: #f0a0a0; }
    .wl-- { background: #333; color: #777; }
    .md-dur { text-align: center; color: #bbb; font-variant-numeric: tabular-nums; min-width: 52px; }
    .md-bans { margin-top: 12px; padding-top: 10px; border-top: 1px solid #333; font-size: 0.78rem; }
    .md-bans summary { cursor: pointer; color: #aaa; }
    .md-meta-row { margin-top: 10px; font-size: 0.78rem; color: #888; }
    .md-game-admin { display: grid; gap: 6px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #2a2a2a; }
    .md-pick-row { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .md-pick-row select { max-width: 110px; font-size: 0.7rem; padding: 2px 4px; }
    .teams-grid-wiki {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .team-wiki-card h3 {
      font-size: 0.95rem;
      color: #fff;
      margin-bottom: 6px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .roster-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .roster-table th, .roster-table td {
      padding: 5px 7px;
      text-align: left;
      border-bottom: 1px solid #252525;
      vertical-align: top;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .roster-table th { color: #777; font-weight: 600; width: 52px; }
    .modal-content h3 { margin-bottom: 14px; font-size: 1.05rem; }
    .match-detail-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .team-detail {
      flex: 1;
      min-width: 200px;
      background: #252525;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .score-input { width: 72px; padding: 6px; margin-top: 6px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 6px; }
    .stream-input { width: 100%; margin-top: 8px; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 6px; }
    .modal-actions { text-align: center; margin-top: 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .modal-actions button {
      background: #333;
      border: 1px solid #484848;
      color: #eee;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    .modal-actions button.primary { background: #3d5a80; border-color: #4a6a9a; }
    .modal-actions button:hover { filter: brightness(1.08); }
    .page-inner { max-width: 1280px; margin: 0 auto; padding: 0 16px 32px; }
    .wiki-panel {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }
    .wiki-panel h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.25;
    }
    .wiki-panel .wiki-meta {
      font-size: 0.85rem;
      color: #9a9a9a;
      margin-bottom: 12px;
      line-height: 1.45;
    }
    .wiki-panel .wiki-desc {
      font-size: 0.9rem;
      color: #c4c4c4;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .wiki-teams-block h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #ddd;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .team-wiki-card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.85rem;
    }
    .team-wiki-card .notice {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 8px;
      font-style: italic;
    }
    .section-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 20px 0 22px;
    }
    .toolbar-title { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* —— Страница: сайдбар + основной столбец —— */
    .layout-page {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 22px;
      max-width: 1480px;
      margin: 0 auto;
    }
    .sidebar-infobox {
      flex: 0 0 300px;
      width: 300px;
      max-width: 100%;
      position: sticky;
      top: 12px;
      align-self: flex-start;
    }
    .main-flow {
      flex: 1;
      min-width: 0;
    }
    @media (max-width: 980px) {
      .layout-page { flex-direction: column; }
      .sidebar-infobox {
        position: relative;
        top: 0;
        width: 100%;
        flex: none;
      }
    }

    /* Инфобокс (Liquipedia-стиль) */
    .infobox {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      font-size: 0.8rem;
      margin-bottom: 14px;
    }
    .infobox-title {
      background: #7c1212;
      color: #fff;
      font-weight: 700;
      padding: 8px 10px;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
    }
    .infobox-logo-wrap {
      padding: 14px 12px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }
    .infobox-logo-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #8a6a3a, #3a2a18 55%, #1a1510);
      border: 3px solid #6a5230;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 800;
      color: #c9a227;
      text-shadow: 0 1px 2px #000;
    }
    .infobox-logo-text {
      font-size: 0.72rem;
      color: #bbb;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .infobox-section-head {
      background: #7c1212;
      color: #fff;
      font-weight: 600;
      padding: 6px 10px;
      font-size: 0.75rem;
    }
    .infobox-table { width: 100%; border-collapse: collapse; }
    .infobox-table tr { border-bottom: 1px solid #252525; }
    .infobox-table th {
      color: #8a8a8a;
      font-weight: 500;
      text-align: right;
      padding: 6px 8px;
      vertical-align: top;
      width: 38%;
    }
    .infobox-table td {
      color: #e8e8e8;
      padding: 6px 8px;
      text-align: left;
    }
    .infobox-table a, .link-wiki {
      color: #63a9ff;
      text-decoration: none;
    }
    .infobox-table a:hover, .link-wiki:hover { text-decoration: underline; }

    /* Итоговая таблица призовых */
    .standings-wrap {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .standings-head {
      background: #1a1a1a;
      color: #ccc;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: grid;
      grid-template-columns: 72px 100px 1fr;
      padding: 8px 10px;
      border-bottom: 1px solid #2a2a2a;
    }
    .standings-row {
      display: grid;
      grid-template-columns: 72px 100px 1fr;
      align-items: center;
      border-bottom: 1px solid #222;
      font-size: 0.8rem;
    }
    .standings-row .cell-place {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
      font-weight: 700;
      color: #fff;
    }
    .standings-row .cell-prize { text-align: center; color: #eee; font-variant-numeric: tabular-nums; }
    .standings-row .cell-team {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
    }
    .standings-row .cell-team a { color: #63a9ff; text-decoration: none; }
    .standings-row .cell-team a:hover { text-decoration: underline; }
    .medal-1st { background: linear-gradient(180deg, #c9a227, #8a7018); }
    .medal-2nd { background: linear-gradient(180deg, #9a9a9a, #5a5a5a); }
    .medal-3rd { background: linear-gradient(180deg, #a07040, #5a3820); }
    .medal-4th { background: linear-gradient(180deg, #6a4830, #3a2818); }
    .standings-lower summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      background: #161616;
      color: #ddd;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }
    .standings-lower summary::-webkit-details-marker { display: none; }
    .standings-lower .chev { transition: transform 0.15s; font-size: 0.7rem; opacity: 0.8; }
    .standings-lower[open] .chev { transform: rotate(180deg); }
    .standings-lower-body { padding: 0; background: #0a0a0a; }
    .standings-empty {
      padding: 14px 12px;
      font-size: 0.8rem;
      color: #888;
      line-height: 1.45;
      text-align: center;
    }
    .standings-group {
      display: grid;
      grid-template-columns: 88px 88px 1fr;
      font-size: 0.78rem;
      border-bottom: 1px solid #222;
    }
    .standings-group .g-place {
      padding: 10px;
      color: #aaa;
      border-right: 1px solid #222;
      align-self: stretch;
      display: flex;
      align-items: flex-start;
    }
    .standings-group .g-prize {
      padding: 10px;

  function dotaHeroSlug(name) {

  const VIEWER_COMMANDS_HTML = `

      <li>Не публикуйте спойлеры результата матча до официального объявления, если трансляция с задержкой.</li>

      <li>Команды для бота/чата (если используются на стриме) уточняйте у организаторов турнира.</li>
    </ul>
  `;

  const STORAGE_KEYS = {
    teams: 'tournament_teams_list_v2',
    matches: 'tournament_matches_list_v2',
    formats: 'tournament_formats_list_v2',
    infobox: 'tournament_infobox_list_v2',
    bracketMeta: 'tournament_bracket_meta_v1'
  };

  let formats = {
    ubqf: 3, ubsf: 3, ubf: 3,
    lbr1: 3, lbqf: 3, lbsf: 3, lbf: 3,
    gf: 5,
    se: 3
  };

  function emptyGame() {
    return { duration: '', winner: '', picks_t1: ['', '', '', '', ''], picks_t2: ['', '', '', '', ''] };
  }

  function ensureMatchDetail(m) {
    if (!m.matchDetail) m.matchDetail = { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] };
    if (!Array.isArray(m.matchDetail.games)) m.matchDetail.games = [];
    if (!Array.isArray(m.matchDetail.bans_t1)) m.matchDetail.bans_t1 = [];
    if (!Array.isArray(m.matchDetail.bans_t2)) m.matchDetail.bans_t2 = [];
  }

  function padGamesToFormat(m, maxGames) {
    ensureMatchDetail(m);
    while (m.matchDetail.games.length < maxGames) m.matchDetail.games.push(emptyGame());
    while (m.matchDetail.games.length > maxGames) m.matchDetail.games.pop();
    m.matchDetail.games.forEach(g => {
      g.picks_t1 = (g.picks_t1 && g.picks_t1.length) ? [...g.picks_t1] : [];
      g.picks_t2 = (g.picks_t2 && g.picks_t2.length) ? [...g.picks_t2] : [];
      while (g.picks_t1.length < 5) g.picks_t1.push('');
      while (g.picks_t2.length < 5) g.picks_t2.push('');
      g.picks_t1.length = 5;
      g.picks_t2.length = 5;
      if (g.winner !== 't1' && g.winner !== 't2') g.winner = '';
      if (g.duration == null) g.duration = '';
    });
  }

  function normalizeMatchesGameDetails() {
    matches.forEach(m => ensureMatchDetail(m));
  }

  function heroIconImg(hero, size) {
    const sz = size || 26;
    if (!hero) return `<span class="hero-slot-empty" style="width:${sz}px;height:${sz}px"></span>`;
    const slug = dotaHeroSlug(hero);
    const u = `https://cdn.akamai.steamstatic.com/apps/dota2/images/dota_react/heroes/${slug}.png`;
    return `<img class="hero-icon-img" src="${escapeHtml(u)}" width="${sz}" height="${sz}" alt="${escapeHtml(hero)}" title="${escapeHtml(hero)}" loading="lazy" onerror="this.classList.add('hero-icon-broken')"/>`;
  }

  function displaySlotTeam(match, idx) {
    const t = idx === 1 ? match.team1 : match.team2;
    if (isByeTeam(t)) return 'BYE';
    return t && t.name ? t.name : '—';
  }

  function loserNotWinner(mm) {
    if (!mm || !mm.winner || !mm.team1 || !mm.team2) return null;
    return mm.winner === mm.team1 ? mm.team2 : mm.team1;
  }

  function heroSelectHtml(selectedVal, id) {
    let o = '<option value="">—</option>';
    heroList.forEach(h => {
      o += `<option value="${escapeHtml(h)}" ${h === selectedVal ? 'selected' : ''}>${escapeHtml(h)}</option>`;

  }

  function toDateTimeLocalValue(raw) {
    if (!raw) return '';
    const d = new Date(raw);
    if (isNaN(d.getTime())) return String(raw).length >= 16 ? String(raw).slice(0, 16) : String(raw);
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  const ROUND_LABELS = {
    UBQF: 'UB Quarterfinals',
    UBSF: 'UB Semifinals',
    UBF: 'UB Final',
    LBR1: 'LB Round 1',
    LBQF: 'LB Quarterfinals',
    LBSF: 'LB Semifinal',
    LBF: 'LB Final',
    GF: 'Grand Final'
  };

  /** Пары для линий: [fromId, toId, kind] kind: 'win' | 'loss' */
  const BRACKET_EDGES = [
    ['ubqf_0', 'ubsf_0', 'win'], ['ubqf_1', 'ubsf_0', 'win'],
    ['ubqf_2', 'ubsf_1', 'win'], ['ubqf_3', 'ubsf_1', 'win'],
    ['ubsf_0', 'ubf', 'win'], ['ubsf_1', 'ubf', 'win'],
    ['ubqf_0', 'lbr1_0', 'loss'],
    ['ubqf_1', 'lbr1_0', 'loss'],
    ['ubqf_2', 'lbr1_1', 'loss'],
    ['ubqf_3', 'lbr1_1', 'loss'],
    ['lbr1_0', 'lbqf_0', 'win'],
    ['lbr1_1', 'lbqf_1', 'win'],
    ['ubsf_0', 'lbqf_0', 'loss'], ['ubsf_1', 'lbqf_1', 'loss'],
    ['lbqf_0', 'lbsf', 'win'], ['lbqf_1', 'lbsf', 'win'],
    ['lbsf', 'lbf', 'win'],
    ['ubf', 'lbf', 'loss'],
    ['ubf', 'gf', 'win'], ['lbf', 'gf', 'win']
  ];

  const BRACKET_SIZE_OPTIONS = [4, 6, 8, 9, 12];
  const BYE_TEAM = { id: -1, name: 'BYE', players: [], notice: '', __bye: true };

  let bracketMeta = { size: 8, type: 'DE' };
  let editingTeamId = null;
  /** Чтобы вкладка админки не сбрасывалась при каждом renderEverything */
  let adminDockActiveTab = 'tournament';

  function isByeTeam(t) {
    return t && (t.__bye || t.name === 'BYE' || t.id === -1);
  }

  function nextPow2(n) {
    let p = 1;
    while (p < n) p <<= 1;
    return p;
  }

  function isSingleElimActive() {
    return matches.length > 0 && matches.some(m => m.round && /^SE\d+$/.test(m.round));
  }

  function createSingleElimBracket(teamsOrdered) {
    const n = teamsOrdered.length;
    const P = nextPow2(n);
    const slots = [];
    for (let i = 0; i < P; i++) slots.push(i < n ? teamsOrdered[i] : BYE_TEAM);
    const rounds = Math.round(Math.log2(P));
    const out = [];
    for (let r = 0; r < rounds; r++) {
      const cnt = P >> (r + 1);
      for (let i = 0; i < cnt; i++) {
        const id = `se_${r}_${i}`;
        let t1 = null;
        let t2 = null;
        if (r === 0) {
          t1 = slots[i * 2] || null;
          t2 = slots[i * 2 + 1] || null;
        }
        out.push({
          id,
          round: `SE${r}`,
          stage: 'single',
          seRound: r,
          seIdx: i,
          team1: t1,
          team2: t2,
          score1: 0,
          score2: 0,
          winner: null,
          picks: { t1: [], t2: [] },
          stream: '',
          matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] }
        });
      }
    }
    return out;
  }

  function resolveByeWinnersSe() {
    matches.forEach(m => {
      if (!/^SE\d+$/.test(m.round || '')) return;
      if (m.winner) return;
      const b1 = isByeTeam(m.team1);
      const b2 = isByeTeam(m.team2);
      if (b1 && !b2 && m.team2) m.winner = m.team2;
      else if (b2 && !b1 && m.team1) m.winner = m.team1;
      else if (b1 && b2) m.winner = null;
    });
  }

  function propagateSingleElim() {
    const maxR = matches.reduce((mx, m) => {
      if (!/^SE\d+$/.test(m.round || '')) return mx;
      return Math.max(mx, parseInt(m.round.slice(2), 10));
    }, -1);
    if (maxR < 0) return;
    for (let sweep = 0; sweep < maxR + 3; sweep++) {
      resolveByeWinnersSe();
      for (let r = 0; r < maxR; r++) {
        const row = matches.filter(m => m.round === `SE${r}`).sort((a, b) => a.seIdx - b.seIdx);
        for (const m of row) {
          const next = findMatch(`se_${r + 1}_${Math.floor(m.seIdx / 2)}`);
          if (!next) continue;
          if (m.seIdx % 2 === 0) next.team1 = m.winner ?? null;
          else next.team2 = m.winner ?? null;
        }
      }
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  /** Для value="" и других атрибутов — кавычки ломали разметку панели */
  function escapeHtmlAttr(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function isoDateInputValue(raw) {
    if (raw == null || raw === '') return '';
    const s = String(raw).trim().slice(0, 10);
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return '';
    const p = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
  }

  function findSeFinalMatch() {
    const se = matches.filter(m => m.round && /^SE\d+$/.test(m.round));
    if (!se.length) return null;
    const maxR = Math.max(...se.map(m => parseInt(m.round.slice(2), 10)));
    return se.filter(m => parseInt(m.round.slice(2), 10) === maxR).sort((a, b) => a.seIdx - b.seIdx)[0] || null;
  }

  function maxSeRoundIndex() {
    return matches.reduce((mx, m) => {
      if (!/^SE\d+$/.test(m.round || '')) return mx;
      return Math.max(mx, parseInt(m.round.slice(2), 10));
    }, -1);
  }

  function wireViewerTeamCards() {
    const grid = document.getElementById('teams-grid-wiki');
    if (!grid || grid._vteamDelegation) return;
    grid._vteamDelegation = true;
    grid.addEventListener('click', e => {
      const tab = e.target.closest('.vteam-tabs button');
      if (tab && grid.contains(tab)) {
        const card = tab.closest('.vteam-card');
        if (!card) return;
        card.querySelectorAll('.vteam-tabs button').forEach(b => b.classList.toggle('active', b === tab));
        const main = card.querySelector('.vteam-pane-main');
        const staff = card.querySelector('.vteam-pane-staff');
        const onMain = tab.dataset.tab === 'main';
        if (main) main.style.display = onMain ? 'block' : 'none';
        if (staff) staff.style.display = onMain ? 'none' : 'block';
        return;
      }
      const head = e.target.closest('.vteam-head');
      if (!head || !grid.contains(head)) return;
      const card = head.closest('.vteam-card');
      if (!card) return;
      card.classList.toggle('expanded');
      head.setAttribute('aria-expanded', card.classList.contains('expanded') ? 'true' : 'false');
    });
    grid.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const head = e.target.closest('.vteam-head');
      if (!head || !grid.contains(head)) return;
      e.preventDefault();
      const card = head.closest('.vteam-card');
      if (!card) return;
      card.classList.toggle('expanded');
      head.setAttribute('aria-expanded', card.classList.contains('expanded') ? 'true' : 'false');
    });
  }

  function teamInitials(name) {
    if (!name || name === 'TBD') return '?';
    if (name === 'BYE') return 'BY';
    const parts = name.trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return name.slice(0, 2).toUpperCase();
  }

  function logoHue(name) {
    const s = name == null ? '' : String(name);
    if (!s.length) return 42;
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h + s.charCodeAt(i) * 13) % 360;
    return h;
  }

  function inferBracketMetaFromMatches() {
    const r0 = matches.filter(m => m.round === 'SE0');
    if (r0.length) {
      const flat = [];
      r0.sort((a, b) => a.seIdx - b.seIdx).forEach(m => { flat.push(m.team1, m.team2); });
      const cnt = flat.filter(t => t && !isByeTeam(t)).length;
      return { size: Math.max(2, cnt || 8), type: 'SE' };
    }
    if (matches.some(m => m.round === 'UBQF')) return { size: 8, type: 'DE' };
    return null;
  }

  function loadAll() {
    const storedTeams = localStorage.getItem(STORAGE_KEYS.teams);
    try {
      teams = storedTeams ? JSON.parse(storedTeams) : getDefaultTeams();
    } catch (_) {
      teams = getDefaultTeams();
    }
    if (!Array.isArray(teams)) {
      teams = getDefaultTeams();
    } else {
      teams = teams.map((t, i) => {
        if (!t || typeof t !== 'object') {
          return { id: Date.now() + i, name: 'Команда', players: [], notice: '' };
        }
        const id = typeof t.id === 'number' && !Number.isNaN(t.id) ? t.id : Date.now() + i;
        const nm = String(t.name != null ? t.name : '').trim() || 'Команда';
        const pls = Array.isArray(t.players)
          ? t.players.filter(p => p && p.name).map(p => ({
            name: String(p.name).trim() || 'Player',
            role: parseInt(p.role, 10) || 1
          }))
          : [];
        return { id, name: nm, players: pls, notice: t.notice != null ? String(t.notice) : '' };
      });
    }

    const storedMatches = localStorage.getItem(STORAGE_KEYS.matches);
    try {
      matches = storedMatches ? JSON.parse(storedMatches) : [];
    } catch (_) {
      matches = [];
    }
    if (!Array.isArray(matches)) matches = [];
    matches = matches.filter(m => m && typeof m === 'object' && m.id != null && m.round);
    if (matches.filter(m => m.round === 'LBR1').length > 2) {
      matches = [];
      localStorage.setItem(STORAGE_KEYS.matches, JSON.stringify(matches));
    }
    const storedFormats = localStorage.getItem(STORAGE_KEYS.formats);
    try {
      if (storedFormats) {
        const f = JSON.parse(storedFormats);
        if (f && typeof f === 'object') formats = { ...formats, ...f };
      }
    } catch (_) {}
    if (formats.se == null || Number.isNaN(+formats.se)) formats.se = 3;
    const storedInfobox = localStorage.getItem(STORAGE_KEYS.infobox);
    if (storedInfobox) {
      try {
        const data = JSON.parse(storedInfobox);
        infobox = {
          ...infobox,
          name: data.name || infobox.name,
          description: 'description' in data ? data.description : infobox.description,
          prize: 'prize' in data ? data.prize : infobox.prize,
          dates: 'dates' in data ? data.dates : infobox.dates,
          version: 'version' in data ? data.version : infobox.version,
          series: data.series != null ? data.series : infobox.series,
          organizer: data.organizer != null ? data.organizer : infobox.organizer,
          server: data.server != null ? data.server : infobox.server,
          type: data.type != null ? data.type : infobox.type,
          location: data.location != null ? data.location : infobox.location,
          venue: data.venue != null ? data.venue : infobox.venue,
          format: data.format != null ? data.format : infobox.format,
          startDate: data.startDate != null ? data.startDate : infobox.startDate,
          endDate: data.endDate != null ? data.endDate : infobox.endDate,
          game: data.game != null ? data.game : infobox.game,
          teamCount: data.teamCount != null ? data.teamCount : infobox.teamCount,
          liquipediaTier: data.liquipediaTier != null ? data.liquipediaTier : infobox.liquipediaTier,
          prizeByPlace: Array.isArray(data.prizeByPlace) ? data.prizeByPlace : infobox.prizeByPlace
        };
      } catch (_) {}
    }
    normalizeMatchesGameDetails();
    const storedMeta = localStorage.getItem(STORAGE_KEYS.bracketMeta);
    if (storedMeta) {
      try {
        const j = JSON.parse(storedMeta);
        if (j && BRACKET_SIZE_OPTIONS.includes(j.size)) {
          const t = j.type === 'DE' && j.size === 8 ? 'DE' : 'SE';
          bracketMeta = { size: j.size, type: t };
        }
      } catch (_) {}
    } else {
      const inferred = inferBracketMetaFromMatches();
      if (inferred) bracketMeta = inferred;
    }
  }

  function findMatch(id) {
    return matches.find(m => m.id === id);
  }

  /** Порядок 8 команд из текущих слотов UB QF (для пересборки сетки без сброса пар) */
  function orderedTeamsFromCurrentUBQF() {
    const ub = matches.filter(m => m.round === 'UBQF').sort((a, b) => String(a.id).localeCompare(String(b.id)));
    if (ub.length !== 4) return null;
    const out = [];
    for (const m of ub) {
      if (m.team1) out.push(m.team1);
      if (m.team2) out.push(m.team2);
    }
    return out.length === 8 ? out : null;
  }

  function orderedTeamsFromSeRound0(expectedCount) {
    const need = expectedCount != null ? expectedCount : bracketMeta.size;
    const r0 = matches.filter(m => m.round === 'SE0').sort((a, b) => a.seIdx - b.seIdx);
    if (!r0.length) return null;
    const flat = [];
    r0.forEach(m => { flat.push(m.team1, m.team2); });
    const real = flat.filter(t => t && !isByeTeam(t));
    return real.length === need ? real : null;
  }

  function createEmptyBracket(teamsArray) {
    if (teamsArray.length !== 8) return [];
    const ubQF = [];
    for (let i = 0; i < 4; i++) {
      ubQF.push({
        id: `ubqf_${i}`, round: 'UBQF', stage: 'winners',
        team1: teamsArray[i * 2], team2: teamsArray[i * 2 + 1],
        score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '',
        matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] }
      });
    }
    const ubSF = [
      { id: 'ubsf_0', round: 'UBSF', stage: 'winners', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } },
      { id: 'ubsf_1', round: 'UBSF', stage: 'winners', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } }
    ];
    const ubFinal = { id: 'ubf', round: 'UBF', stage: 'winners', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } };
    const lbR1 = [
      { id: 'lbr1_0', round: 'LBR1', stage: 'losers', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } },
      { id: 'lbr1_1', round: 'LBR1', stage: 'losers', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } }
    ];
    const lbQF = [
      { id: 'lbqf_0', round: 'LBQF', stage: 'losers', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } },
      { id: 'lbqf_1', round: 'LBQF', stage: 'losers', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } }
    ];
    const lbSF = { id: 'lbsf', round: 'LBSF', stage: 'losers', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } };
    const lbFinal = { id: 'lbf', round: 'LBF', stage: 'losers', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } };
    const grandFinal = { id: 'gf', round: 'GF', stage: 'final', team1: null, team2: null, score1: 0, score2: 0, winner: null, picks: { t1: [], t2: [] }, stream: '', matchDetail: { scheduledAt: '', casters: '', bans_t1: [], bans_t2: [], games: [] } };
    return [...ubQF, ...ubSF, ubFinal, ...lbR1, ...lbQF, lbSF, lbFinal, grandFinal];
  }

  function propagateAllMatches() {
    const ubQF = matches.filter(m => m.round === 'UBQF');
    const ubSF = matches.filter(m => m.round === 'UBSF');
    const ubF = matches.find(m => m.round === 'UBF');
    const lbR1 = matches.filter(m => m.round === 'LBR1');
    const lbQF = matches.filter(m => m.round === 'LBQF');
    const lbSF = matches.find(m => m.round === 'LBSF');
    const lbF = matches.find(m => m.round === 'LBF');
    const gf = matches.find(m => m.round === 'GF');

    if (ubQF.length === 4 && ubSF.length === 2) {
      ubSF[0].team1 = ubQF[0]?.winner ?? null;
      ubSF[0].team2 = ubQF[1]?.winner ?? null;
      ubSF[1].team1 = ubQF[2]?.winner ?? null;
      ubSF[1].team2 = ubQF[3]?.winner ?? null;
    }
    if (ubSF.length === 2 && ubF) {
      ubF.team1 = ubSF[0]?.winner ?? null;
      ubF.team2 = ubSF[1]?.winner ?? null;
    }
    function loserOfQF(qf) {
      if (!qf || !qf.team1 || !qf.team2 || !qf.winner) return null;
      return qf.winner === qf.team1 ? qf.team2 : qf.team1;
    }
    if (ubQF.length === 4 && lbR1.length === 2) {
      lbR1[0].team1 = loserOfQF(ubQF[0]);
      lbR1[0].team2 = loserOfQF(ubQF[1]);
      lbR1[1].team1 = loserOfQF(ubQF[2]);
      lbR1[1].team2 = loserOfQF(ubQF[3]);
    }
    if (lbQF.length === 2 && lbR1.length === 2 && ubSF.length === 2) {
      lbQF[0].team1 = lbR1[0]?.winner ?? null;
      lbQF[0].team2 = loserNotWinner(ubSF[0]);
      lbQF[1].team1 = lbR1[1]?.winner ?? null;
      lbQF[1].team2 = loserNotWinner(ubSF[1]);
    }
    if (lbSF && lbQF.length === 2) {
      lbSF.team1 = lbQF[0]?.winner ?? null;
      lbSF.team2 = lbQF[1]?.winner ?? null;
    }
    if (lbF && lbSF && ubF) {
      lbF.team1 = lbSF?.winner ?? null;
      lbF.team2 = loserNotWinner(ubF);
    }
    if (gf && ubF && lbF) {
      gf.team1 = ubF?.winner ?? null;
      gf.team2 = lbF?.winner ?? null;
    }
    saveAll();
  }

  function shuffleCopy(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function adminTeamSelectHtml(selectId) {
    const opts = teams.map(t => `<option value="${t.id}">${escapeHtml(t.name)}</option>`).join('');
    return `<select id="${selectId}" style="max-width:160px;width:100%;font-size:0.7rem"><option value="">—</option>${opts}</select>`;
  }

  function buildManualGridHtml(size, type) {
    if (type === 'DE' && size === 8) {
      return [0, 1, 2, 3].map(qi =>
        `<div style="margin-bottom:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center"><span>UB QF ${qi + 1}</span>${adminTeamSelectHtml(`manual-t${qi * 2}`)}<span>vs</span>${adminTeamSelectHtml(`manual-t${qi * 2 + 1}`)}</div>`
      ).join('');
    }
    return `<div style="display:flex;flex-direction:column;gap:6px">${Array.from({ length: size }, (_, i) =>
      `<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center"><span style="min-width:52px;color:#888">#${i + 1}</span>${adminTeamSelectHtml(`manual-t${i}`)}</div>`
    ).join('')}</div>`;
  }

  function buildBracket() {
    const sizeEl = document.getElementById('adm-br-size');
    const typeEl = document.getElementById('adm-br-type');
    const size = sizeEl ? parseInt(sizeEl.value, 10) : bracketMeta.size;
    if (!BRACKET_SIZE_OPTIONS.includes(size)) {
      alert('Некорректный размер сетки');
      return;
    }
    let type = 'SE';
    if (size === 8 && typeEl && typeEl.value === 'DE') type = 'DE';
    if (teams.length < size) {
      alert(`Нужно не меньше ${size} команд в списке. Сейчас ${teams.length}.`);
      return;
    }
    const pool = teams.slice(0, size);
    let ordered = [...pool];
    const manual = document.getElementById('br-pair-manual');
    const random = document.getElementById('br-pair-random');
    if (manual && manual.checked) {
      const slots = [];
      const slotCount = type === 'DE' && size === 8 ? 8 : size;
      for (let i = 0; i < slotCount; i++) {
        const sel = document.getElementById(`manual-t${i}`);
        const id = sel ? parseInt(sel.value, 10) : NaN;
        slots.push(teams.find(x => x.id === id));
      }
      if (slots.some(x => !x)) {
        alert('В ручном режиме выберите все позиции (каждая команда ровно один раз).');
        return;
      }
      const ids = new Set(slots.map(t => t.id));
      if (ids.size !== slotCount) {
        alert('Команды в ручных слотах не должны повторяться.');
        return;
      }
      ordered = slots;
    } else if (random && random.checked) {
      ordered = shuffleCopy(pool);
    }
    bracketMeta = { size, type };
    if (type === 'DE') {
      matches = createEmptyBracket(ordered);
      propagateAllMatches();
    } else {
      matches = createSingleElimBracket(ordered);
      propagateBracket();
    }
    saveAll();
    renderEverything();
  }

  function renderMatchHtml(match, opts) {
    if (!match || match.id == null) {
      return '<div class="match" role="presentation"><div class="team-row"><span class="team-name">—</span></div></div>';
    }

    const t2 = displaySlotTeam(match, 2);

          <span class="team-name">${escapeHtml(t1)}</span>

          <span class="team-name">${escapeHtml(t2)}</span>

  function ubSpacerBeforeFirstSf() {
    const block = MATCH_H * 2 + UB_QF_GAP;
    const h = block / 2 - MATCH_H / 2;
    return `<div class="match-spacer" style="height:${h}px"></div>`;
  }

  function ubFinalSpacer() {
    const centerUb = (MATCH_H * 2 + UB_QF_GAP) * 1.5 + UB_QF_GAP / 2;
    const h = centerUb - MATCH_H / 2;
    return `<div class="match-spacer" style="height:${h}px"></div>`;
  }

  function renderBracketGrid() {
    const inner = document.getElementById('bracket-inner');
    if (!inner) return;
    if (matches.length === 0) {
      inner.innerHTML = '<p class="empty-hint">Сетка не создана. Войдите как админ, настройте число команд и нажмите «Сформировать сетку».</p>';
      drawBracketLines();
      return;
    }

    if (isSingleElimActive()) {
      const maxR = maxSeRoundIndex();
      const cols = [];
      for (let r = 0; r <= maxR; r++) {
        const colMatches = matches.filter(m => m.round === `SE${r}`).sort((a, b) => a.seIdx - b.seIdx);
        const title = seColumnTitle(r, maxR);
        const stack = colMatches.map(m => renderMatchHtml(m, r === maxR ? { gf: true } : {})).join(`<div style="height:${UB_QF_GAP}px"></div>`);
        cols.push(`<div class="round-col bracket-se-col"><div class="round-title">${escapeHtml(title)}</div><div class="match-stack">${stack}</div></div>`);
      }
      inner.innerHTML = `<div class="bracket-se-grid">${cols.join('')}</div>`;
    } else {
      if (teams.length !== 8) {
        inner.innerHTML = '<p class="empty-hint">Сетка double elimination рассчитана на 8 команд. Добавьте 8 команд или выберите одинарную сетку (SE) для другого числа участников.</p>';
        drawBracketLines();
        return;
      }

      const m = id => findMatch(id);
      const deRequired = ['ubqf_0', 'ubqf_1', 'ubqf_2', 'ubqf_3', 'ubsf_0', 'ubsf_1', 'ubf', 'lbr1_0', 'lbr1_1', 'lbqf_0', 'lbqf_1', 'lbsf', 'lbf', 'gf'];
      if (!deRequired.every(id => m(id))) {
        inner.innerHTML = '<p class="empty-hint">В сохранённой сетке не хватает матчей (данные обрезаны или устарели). Войдите как админ (кнопка справа вверху) и снова нажмите «Сформировать сетку» на вкладке «Сетка», либо в консоли выполните localStorage.clear() для этого сайта.</p>';
        drawBracketLines();
        return;
      }

      const col = (titleKey, stackHtml, extraClass = '') =>
        `<div class="round-col ${extraClass}"><div class="round-title">${ROUND_LABELS[titleKey] || titleKey}</div><div class="match-stack">${stackHtml}</div></div>`;

      const cell = (gridCol, gridRow, innerHtml, extraClass = '', rowSpan = 1) => {
        const rs = rowSpan > 1 ? `grid-row: ${gridRow} / span ${rowSpan}` : `grid-row: ${gridRow}`;
        return `<div class="bracket-cell ${extraClass}" style="grid-column:${gridCol}; ${rs}">${innerHtml}</div>`;
      };

      const ubQf = col('UBQF', [0, 1, 2, 3].map(i => renderMatchHtml(m(`ubqf_${i}`))).join(`<div style="height:${UB_QF_GAP}px"></div>`));
      const ubSf = col('UBSF', ubSpacerBeforeFirstSf() + renderMatchHtml(m('ubsf_0')) + `<div style="height:${GAP_UB_SF}px"></div>` + renderMatchHtml(m('ubsf_1')));
      const ubF = col('UBF', ubFinalSpacer() + renderMatchHtml(m('ubf')));
      const lbR1 = col('LBR1', ubSpacerBeforeFirstSf() + renderMatchHtml(m('lbr1_0')) + `<div style="height:${GAP_UB_SF}px"></div>` + renderMatchHtml(m('lbr1_1')));
      const lbQf = col('LBQF', ubSpacerBeforeFirstSf() + renderMatchHtml(m('lbqf_0')) + `<div style="height:${GAP_UB_SF}px"></div>` + renderMatchHtml(m('lbqf_1')));
      const lbSf = col('LBSF', ubSpacerBeforeFirstSf() + renderMatchHtml(m('lbsf')));
      const lbF = col('LBF', ubFinalSpacer() + renderMatchHtml(m('lbf')));
      const gfInner = `<div class="round-col"><div class="round-title">${ROUND_LABELS.GF}</div>${renderMatchHtml(m('gf'), { gf: true })}</div>`;

      inner.innerHTML =
        `<div class="bracket-liquid">` +
        cell(1, 1, ubQf) +
        cell(2, 1, ubSf) +
        cell(3, 1, '', 'bracket-cell--ub-gap') +
        cell(4, 1, ubF) +
        cell(5, 1, gfInner, 'gf-bracket-cell', 2) +
        cell(1, 2, lbR1) +
        cell(2, 2, lbQf) +
        cell(3, 2, lbSf) +
        cell(4, 2, lbF) +
        `</div>`;
    }

    inner.querySelectorAll('.match').forEach(el => {
      const id = el.dataset.matchId;
      const match = findMatch(id);
      const open = e => {
        if (e.target.closest('.info-dot')) return;
        if (match) showMatchModal(match);
      };
      el.addEventListener('click', open);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(e); } });
    });
    inner.querySelectorAll('.info-dot').forEach(dot => {
      dot.addEventListener('click', e => {
        e.stopPropagation();
        const id = dot.dataset.infoMatch;
        const match = findMatch(id);
        if (match) showMatchModal(match);
      });
    });

    requestAnimationFrame(() => {
      drawBracketLines();
    });
  }

  function drawBracketLines() {
    const svg = document.getElementById('bracket-svg');
    const wrap = document.getElementById('bracket-wrap');
    const inner = document.getElementById('bracket-inner');
    if (!svg || !wrap || !inner) return;
    const w = inner.offsetWidth;
    const h = inner.offsetHeight;
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.innerHTML = '';

    function rectRel(el) {
      const r = el.getBoundingClientRect();
      const wr = wrap.getBoundingClientRect();
      return {
        l: r.left - wr.left,
        r: r.right - wr.left,
        t: r.top - wr.top,
        b: r.bottom - wr.top,
        cx: (r.left + r.right) / 2 - wr.left,
        cy: (r.top + r.bottom) / 2 - wr.top
      };
    }

    /** Победитель идёт вправо: сначала горизонталь на высоте исходного матча, потом вертикаль у цели (не «падает» вниз в колонку lower). */
    function pathWinHorizontalFirst(Rf, Rt, pad = 16) {
      const ax = Rf.r;
      const ay = Rf.cy;
      const bx = Rt.l;
      const by = Rt.cy;
      const ix = bx - pad;
      return `M ${ax} ${ay} L ${ix} ${ay} L ${ix} ${by} L ${bx} ${by}`;
    }

    /** Проигравший падает в lower: от низа матча вниз, затем к входу в следующий матч слева. */
    function pathLossDrop(Rf, Rt, pad = 16) {
      const ax = Rf.cx;
      const ay = Rf.b;
      const bx = Rt.l;
      const by = Rt.cy;
      const yStep = Math.min(ay + 14, by - 8);
      const hx = bx - pad;
      return `M ${ax} ${ay} L ${ax} ${yStep} L ${hx} ${yStep} L ${hx} ${by} L ${bx} ${by}`;
    }

    function isUbOnly(id) {
      return id === 'ubf' || id.startsWith('ubqf_') || id.startsWith('ubsf_');
    }
    function isLbOnly(id) {
      return id.startsWith('lbr1_') || id.startsWith('lbqf_') || id === 'lbsf' || id === 'lbf';
    }

    function pathForEdge(fromId, toId, kind, Rf, Rt) {
      if (kind === 'loss') {
        return pathLossDrop(Rf, Rt);
      }
      if (toId === 'gf' && (fromId === 'ubf' || fromId === 'lbf')) {
        return pathWinHorizontalFirst(Rf, Rt, 20);
      }
      if (kind === 'win' && isUbOnly(fromId) && isUbOnly(toId)) {
        return pathWinHorizontalFirst(Rf, Rt);
      }
      if (kind === 'win' && isLbOnly(fromId) && isLbOnly(toId)) {
        return pathWinHorizontalFirst(Rf, Rt);
      }
      const ax = Rf.r;
      const ay = Rf.cy;
      const bx = Rt.l;
      const by = Rt.cy;
      const mid = (ax + bx) / 2;
      return `M ${ax} ${ay} L ${mid} ${ay} L ${mid} ${by} L ${bx} ${by}`;
    }

    const strokeWin = 'rgba(255,255,255,0.42)';
    const strokeLoss = 'rgba(255,180,120,0.22)';

    if (isSingleElimActive()) {
      const maxR = maxSeRoundIndex();
      for (let r = 0; r < maxR; r++) {
        const row = matches.filter(m => m.round === `SE${r}`).sort((a, b) => a.seIdx - b.seIdx);
        for (const m of row) {
          const nextId = `se_${r + 1}_${Math.floor(m.seIdx / 2)}`;
          const fromEl = inner.querySelector(`[data-match-id="${m.id}"]`);
          const toEl = inner.querySelector(`[data-match-id="${nextId}"]`);
          if (!fromEl || !toEl) continue;
          const Rf = rectRel(fromEl);
          const Rt = rectRel(toEl);
          const d = pathWinHorizontalFirst(Rf, Rt, 14);
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d);
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', strokeWin);
          path.setAttribute('stroke-width', '1.35');
          svg.appendChild(path);
        }
      }
      return;
    }

    for (const [fromId, toId, kind] of BRACKET_EDGES) {
      const fromEl = inner.querySelector(`[data-match-id="${fromId}"]`);
      const toEl = inner.querySelector(`[data-match-id="${toId}"]`);
      if (!fromEl || !toEl) continue;
      const Rf = rectRel(fromEl);
      const Rt = rectRel(toEl);
      const d = pathForEdge(fromId, toId, kind, Rf, Rt);
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', kind === 'loss' ? strokeLoss : strokeWin);
      path.setAttribute('stroke-width', kind === 'loss' ? '1.1' : '1.35');
      if (kind === 'loss') path.setAttribute('stroke-dasharray', '4 3');
      svg.appendChild(path);
    }
  }

  function renderSchedule() {
    const body = document.getElementById('schedule-body');
    if (!body) return;
    if (matches.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;padding:24px;">Нет матчей</td></tr>';
      return;
    }
    let sorted;
    if (isSingleElimActive()) {
      sorted = [...matches].sort((a, b) => {
        const ar = (() => { const mm = /^SE(\d+)$/.exec(a.round || ''); return mm ? parseInt(mm[1], 10) : 999; })();
        const br = (() => { const mm = /^SE(\d+)$/.exec(b.round || ''); return mm ? parseInt(mm[1], 10) : 999; })();
        if (ar !== br) return ar - br;
        return (a.seIdx || 0) - (b.seIdx || 0);
      });
    } else {
      const order = ['UBQF', 'UBSF', 'UBF', 'LBR1', 'LBQF', 'LBSF', 'LBF', 'GF'];
      sorted = [...matches].sort((a, b) => order.indexOf(a.round) - order.indexOf(b.round));
    }
    body.innerHTML = sorted.map(m => {
      const t1 = displaySlotTeam(m, 1);
      const t2 = displaySlotTeam(m, 2);
      const stream = m.stream ? `<a href="${escapeHtml(m.stream)}" target="_blank" rel="noopener">ссылка</a>` : '—';
      let roundLabel = ROUND_LABELS[m.round] || m.round;
      if (/^SE\d+$/.test(m.round || '')) {
        const mr = maxSeRoundIndex();
        const r = parseInt(m.round.slice(2), 10);
        roundLabel = seColumnTitle(r, mr);
      }
      return `<tr class="schedule-row" data-match-id="${escapeHtml(m.id)}"><td>${escapeHtml(roundLabel)}</td><td>${escapeHtml(t1)}</td><td>${m.score1} : ${m.score2}</td><td>${escapeHtml(t2)}</td><td>${stream}</td></tr>`;
    }).join('');
    body.querySelectorAll('.schedule-row').forEach(row => {
      row.addEventListener('click', () => {
        const match = findMatch(row.dataset.matchId);
        if (match) showMatchModal(match);
      });
    });
  }

        const t2w = g.winner === 't2' ? 'W' : g.winner === 't1' ? 'L' : '—';
        const h1r = [0, 1, 2, 3, 4].map(si => heroIconImg(g.picks_t1[si])).join('');

      } else {
        const r0 = !g.winner ? 'checked' : '';
        const r1 = g.winner === 't1' ? 'checked' : '';
        const r2 = g.winner === 't2' ? 'checked' : '';
        let picks1 = '';
        let picks2 = '';
        for (let si = 0; si < 5; si++) {
          picks1 += heroSelectHtml(g.picks_t1[si] || '', `md-g${gi}-t1-${si}`);
          picks2 += heroSelectHtml(g.picks_t2[si] || '', `md-g${gi}-t2-${si}`);
        }
        gamesHtml += `<div class="md-game-admin"><div style="font-size:0.75rem;color:#aaa">Карта ${gi + 1}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:0.78rem">
            <span style="color:#888">Победитель карты:</span>
            <label><input type="radio" name="md-g${gi}-win" value="" ${r0}> не сыграна</label>
            <label><input type="radio" name="md-g${gi}-win" value="t1" ${r1}> сторона 1</label>
            <label><input type="radio" name="md-g${gi}-win" value="t2" ${r2}> сторона 2</label>
            <label style="margin-left:8px">Длительность <input type="text" id="md-g${gi}-dur" size="7" value="${escapeHtml(g.duration || '')}" placeholder="28:31"></label>
          </div>
          <div class="md-pick-row"><span style="font-size:0.7rem;color:#9a9a9a;flex:0 0 auto">Герои 1:</span>${picks1}</div>
          <div class="md-pick-row"><span style="font-size:0.7rem;color:#9a9a9a;flex:0 0 auto">Герои 2:</span>${picks2}</div></div>`;
      }
    }

    const bans1 = (md.bans_t1 || []).join(', ');
    const bans2 = (md.bans_t2 || []).join(', ');
    const bansListVis = [...(md.bans_t1 || []), ...(md.bans_t2 || [])].filter(Boolean);
    const bansInner = bansListVis.length
      ? `<ul style="margin:6px 0 0 18px;color:#ccc;">${bansListVis.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>`
      : '<div style="color:#666;margin-top:6px">Нет данных</div>';
    const bansAdmin = isAdmin
      ? `<div style="margin-top:8px"><label style="font-size:0.72rem;color:#888">Баны сторона 1 (через запятую)</label><input type="text" id="md-bans-t1" class="stream-input" value="${escapeHtml(bans1)}"><label style="font-size:0.72rem;color:#888;margin-top:6px;display:block">Баны сторона 2</label><input type="text" id="md-bans-t2" class="stream-input" value="${escapeHtml(bans2)}"></div>`
      : '';

    const streamVal = match.stream || '';
    const streamBlock = streamVal.startsWith('http')
      ? `<a href="${escapeHtml(streamVal)}" target="_blank" rel="noopener">${escapeHtml(streamVal)}</a>`
      : escapeHtml(streamVal || '—');

    const dtEl = isAdmin
      ? `<input type="datetime-local" id="md-datetime" class="stream-input" style="max-width:260px" value="${escapeHtml(toDateTimeLocalValue(md.scheduledAt))}">`
      : `<span>${escapeHtml(md.scheduledAt ? new Date(md.scheduledAt).toLocaleString('ru-RU') : '—')}</span>`;

    const castersEl = isAdmin
      ? `<input type="text" id="md-casters" class="stream-input" value="${escapeHtml(md.casters || '')}" placeholder="Ник1, Ник2">`
      : escapeHtml(md.casters || '—');

    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal-content modal-liquipedia">
        <div class="md-head-date">${dtEl}</div>
        <div class="md-summary">
          <div class="md-team-block">
            <span class="team-logo" style="width:32px;height:32px;font-size:0.75rem;background:linear-gradient(135deg,hsl(${h1Hue},35%,28%),hsl(${(h1Hue + 40) % 360},25%,18%))">${escapeHtml(teamInitials(n1))}</span>
            <div><strong>${escapeHtml(n1)}</strong></div>
          </div>
          <div style="text-align:center">
            <div class="md-big-score">${match.score1} : ${match.score2}</div>
            <div class="md-bo">Bo${maxGames}</div>
          </div>
          <div class="md-team-block right">
            <span class="team-logo" style="width:32px;height:32px;font-size:0.75rem;background:linear-gradient(135deg,hsl(${h2Hue},35%,28%),hsl(${(h2Hue + 40) % 360},25%,18%))">${escapeHtml(teamInitials(n2))}</span>
            <div><strong>${escapeHtml(n2)}</strong></div>
          </div>
        </div>
        <div style="font-size:0.72rem;color:#999;margin-bottom:6px">Карты серии</div>
        ${gamesHtml}
        <details class="md-bans"><summary>Баны (показать)</summary>${isAdmin ? bansAdmin : bansInner}</details>
        <div class="md-meta-row">Кастеры: ${castersEl}</div>
        <div style="margin-top:10px;font-size:0.78rem;color:#aaa">Трансляция</div>
        ${isAdmin ? `<input type="text" id="md-stream" class="stream-input" value="${escapeHtml(streamVal)}" placeholder="https://...">` : `<div style="font-size:0.85rem">${streamBlock}</div>`}
        <div class="modal-actions">
          ${isAdmin ? '<button type="button" class="primary" id="save-match">Сохранить</button>' : ''}
          <button type="button" id="close-modal" class="ghost">Закрыть</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    const box = modal.querySelector('.modal-content');
    if (box) box.addEventListener('click', e => e.stopPropagation());
    if (isAdmin) {
      document.getElementById('save-match').onclick = () => {
        const dti = document.getElementById('md-datetime');
        if (dti && dti.value) {
          try {
            match.matchDetail.scheduledAt = new Date(dti.value).toISOString();
          } catch (_) {
            match.matchDetail.scheduledAt = dti.value;
          }
        } else match.matchDetail.scheduledAt = '';
        match.matchDetail.casters = document.getElementById('md-casters').value.trim();
        match.stream = document.getElementById('md-stream').value.trim();
        match.matchDetail.bans_t1 = document.getElementById('md-bans-t1').value.split(',').map(s => s.trim()).filter(Boolean);
        match.matchDetail.bans_t2 = document.getElementById('md-bans-t2').value.split(',').map(s => s.trim()).filter(Boolean);
        let s1 = 0;
        let s2 = 0;
        for (let gi = 0; gi < maxGames; gi++) {
          const durEl = document.getElementById(`md-g${gi}-dur`);
          const dur = durEl ? durEl.value.trim() : '';
          const winEl = modal.querySelector(`input[name="md-g${gi}-win"]:checked`);
          const w = winEl ? winEl.value : '';
          const g = { duration: dur, winner: w === 't1' || w === 't2' ? w : '', picks_t1: [], picks_t2: [] };
          for (let si = 0; si < 5; si++) {
            g.picks_t1.push(document.getElementById(`md-g${gi}-t1-${si}`)?.value || '');
            g.picks_t2.push(document.getElementById(`md-g${gi}-t2-${si}`)?.value || '');
          }
          match.matchDetail.games[gi] = g;
          if (w === 't1') s1++;
          if (w === 't2') s2++;
        }
        match.score1 = s1;
        match.score2 = s2;
        const needed = Math.ceil(maxGames / 2);
        if (s1 >= needed && match.team1) match.winner = match.team1;
        else if (s2 >= needed && match.team2) match.winner = match.team2;
        else match.winner = null;
        const g0 = match.matchDetail.games[0];
        if (g0) match.picks = { t1: g0.picks_t1.filter(Boolean), t2: g0.picks_t2.filter(Boolean) };
        saveAll();
        propagateBracket();
        renderEverything();
        modal.remove();
      };
    }
    document.getElementById('close-modal').onclick = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  }
