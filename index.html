            <div class="format-row"><span>LB R1</span><select id="format-lbr1">${[1, 2, 3, 5].map(v => `<option value="${v}" ${formats.lbr1 === v ? 'selected' : ''}>Bo${v}</option>`).join('')}</select></div>
            <div class="format-row"><span>LB QF</span><select id="format-lbqf">${[1, 2, 3, 5].map(v => `<option value="${v}" ${formats.lbqf === v ? 'selected' : ''}>Bo${v}</option>`).join('')}</select></div>
            <div class="format-row"><span>LB SF</span><select id="format-lbsf">${[1, 2, 3, 5].map(v => `<option value="${v}" ${formats.lbsf === v ? 'selected' : ''}>Bo${v}</option>`).join('')}</select></div>
            <div class="format-row"><span>LB F</span><select id="format-lbf">${[1, 2, 3, 5].map(v => `<option value="${v}" ${formats.lbf === v ? 'selected' : ''}>Bo${v}</option>`).join('')}</select></div>
            <div class="format-row"><span>GF</span><select id="format-gf">${[1, 2, 3, 5].map(v => `<option value="${v}" ${formats.gf === v ? 'selected' : ''}>Bo${v}</option>`).join('')}</select></div>
          </div>
          <div id="se-format-block" class="format-settings" style="margin-top:12px">
            <div style="font-size:0.75rem;color:#999;margin-bottom:6px">Формат серий (single elim.)</div>
            <div class="format-row"><span>Все раунды SE</span><select id="format-se">${[1, 2, 3, 5].map(v => `<option value="${v}" ${formats.se === v ? 'selected' : ''}>Bo${v}</option>`).join('')}</select></div>
          </div>
        </div>
      </div>`;
    const validTabs = new Set(['tournament', 'dates', 'teams', 'bracket']);
    if (!validTabs.has(adminDockActiveTab)) adminDockActiveTab = 'tournament';
    dock.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.dataset.admTab === adminDockActiveTab));
    dock.querySelectorAll('.admin-panel').forEach(p => p.classList.toggle('active', p.dataset.admPanel === adminDockActiveTab));
    const ta = document.getElementById('adm-inf-desc');
    if (ta) ta.value = infobox.description || '';
    const fill = (id, v) => { const el = document.getElementById(id); if (el) el.value = v != null ? String(v) : ''; };
    fill('adm-inf-series', infobox.series);
    fill('adm-inf-organizer', infobox.organizer);
    fill('adm-inf-server', infobox.server);
    fill('adm-inf-type', infobox.type);
    fill('adm-inf-location', infobox.location);
    fill('adm-inf-venue', infobox.venue);
    fill('adm-inf-format', infobox.format);
    fill('adm-inf-game', infobox.game);
    fill('adm-inf-teamcount', infobox.teamCount);
    fill('adm-inf-tier', infobox.liquipediaTier);
    const pg = document.getElementById('adm-prize-grid');
    if (pg) {
      const base = Array.isArray(infobox.prizeByPlace) && infobox.prizeByPlace.length >= 8 ? infobox.prizeByPlace : DEFAULT_PRIZE_BY_PLACE;
      pg.innerHTML = '';
      for (let i = 0; i < 8; i++) {
        const wrap = document.createElement('label');
        wrap.style.display = 'block';
        wrap.innerHTML = `Место ${i + 1} <input type="text" id="adm-prize-${i}" value="${escapeHtmlAttr(base[i] || '')}" style="width:100%;margin-top:2px">`;
        pg.appendChild(wrap);
      }
    }

    function updateBracketPanelFormatVisibility() {
      const szEl = document.getElementById('adm-br-size');
      const tpEl = document.getElementById('adm-br-type');
      const deBlock = document.getElementById('de-format-block');
      const seBlock = document.getElementById('se-format-block');
      const sz = szEl ? parseInt(szEl.value, 10) : 8;
      if (tpEl) {
        const deOpt = tpEl.querySelector('option[value="DE"]');
        if (deOpt) deOpt.disabled = sz !== 8;
        if (sz !== 8 && tpEl.value === 'DE') tpEl.value = 'SE';
      }
      const isDe = sz === 8 && tpEl && tpEl.value === 'DE';
      if (deBlock) deBlock.style.display = isDe ? 'block' : 'none';
      if (seBlock) seBlock.style.display = isDe ? 'none' : 'block';
    }

    function refreshManualGridFromSelects() {
      const g = document.getElementById('manual-br-grid');
      const szEl = document.getElementById('adm-br-size');
      const tpEl = document.getElementById('adm-br-type');
      if (!g || !szEl || !tpEl) return;
      const sz = parseInt(szEl.value, 10);
      const type = sz === 8 && tpEl.value === 'DE' ? 'DE' : 'SE';
      g.innerHTML = buildManualGridHtml(sz, type);
    }

    function populateManualSlots() {
      const szEl = document.getElementById('adm-br-size');
      const tpEl = document.getElementById('adm-br-type');
      const sz = szEl ? parseInt(szEl.value, 10) : bracketMeta.size;
      const type = sz === 8 && tpEl && tpEl.value === 'DE' ? 'DE' : 'SE';
      const ord = type === 'DE' ? orderedTeamsFromCurrentUBQF() : orderedTeamsFromSeRound0(sz);
      const n = type === 'DE' ? 8 : sz;
      if (!ord || ord.length !== n) return;
      for (let i = 0; i < n; i++) {
        const sel = document.getElementById(`manual-t${i}`);
        if (sel && ord[i]) sel.value = String(ord[i].id);
      }
    }

    dock.querySelectorAll('.admin-tab').forEach(tab => {
      tab.onclick = () => {
        const k = tab.dataset.admTab;
        if (!k || !validTabs.has(k)) return;
        adminDockActiveTab = k;
        dock.querySelectorAll('.admin-tab').forEach(t => t.classList.toggle('active', t.dataset.admTab === k));
        dock.querySelectorAll('.admin-panel').forEach(p => p.classList.toggle('active', p.dataset.admPanel === k));
      };
    });

    const syncManualVis = () => {
      const g = document.getElementById('manual-br-grid');
      const m = document.getElementById('br-pair-manual');
      if (g) g.style.display = m && m.checked ? 'block' : 'none';
    };
    ['br-pair-order', 'br-pair-random', 'br-pair-manual'].forEach(rid => {
      const el = document.getElementById(rid);
      if (el) el.onchange = syncManualVis;
    });
    syncManualVis();
    populateManualSlots();

    const szEl = document.getElementById('adm-br-size');
    const tpEl = document.getElementById('adm-br-type');
    if (szEl) szEl.onchange = () => {
      refreshManualGridFromSelects();
      updateBracketPanelFormatVisibility();
      populateManualSlots();
    };
    if (tpEl) tpEl.onchange = () => {
      refreshManualGridFromSelects();
      updateBracketPanelFormatVisibility();
      populateManualSlots();
    };
    updateBracketPanelFormatVisibility();

    const btnSaveTour = document.getElementById('adm-save-tournament');
    if (btnSaveTour) btnSaveTour.onclick = () => {
      infobox = {
        ...infobox,
        name: document.getElementById('adm-inf-name').value.trim() || 'Турнир',
        prize: document.getElementById('adm-inf-prize').value.trim(),
        version: document.getElementById('adm-inf-version').value.trim(),
        description: document.getElementById('adm-inf-desc').value,
        series: document.getElementById('adm-inf-series')?.value?.trim() ?? infobox.series,
        organizer: document.getElementById('adm-inf-organizer')?.value?.trim() ?? infobox.organizer,
        server: document.getElementById('adm-inf-server')?.value?.trim() ?? infobox.server,
        type: document.getElementById('adm-inf-type')?.value?.trim() ?? infobox.type,
        location: document.getElementById('adm-inf-location')?.value?.trim() ?? infobox.location,
        venue: document.getElementById('adm-inf-venue')?.value?.trim() ?? infobox.venue,
        format: document.getElementById('adm-inf-format')?.value?.trim() ?? infobox.format,
        game: document.getElementById('adm-inf-game')?.value?.trim() ?? infobox.game,
        teamCount: document.getElementById('adm-inf-teamcount')?.value?.trim() ?? infobox.teamCount,
        liquipediaTier: document.getElementById('adm-inf-tier')?.value?.trim() ?? infobox.liquipediaTier
      };
      const pz = [];
      for (let i = 0; i < 8; i++) {
        const v = document.getElementById(`adm-prize-${i}`)?.value?.trim();
        pz.push(v || DEFAULT_PRIZE_BY_PLACE[i]);
      }
      infobox.prizeByPlace = pz;
      saveAll();
      renderTournamentBlock();
    };

    function fillDatesTextFromCalendar() {
      const a = document.getElementById('adm-cal-start')?.value;
      const b = document.getElementById('adm-cal-end')?.value;
      const out = document.getElementById('adm-inf-dates');
      if (!a || !b || !out) return;
      const da = new Date(`${a}T12:00:00`);
      const db = new Date(`${b}T12:00:00`);
      if (isNaN(da.getTime()) || isNaN(db.getTime())) return;
      const opts = { day: 'numeric', month: 'short' };
      out.value = `${da.toLocaleDateString('ru-RU', opts)} — ${db.toLocaleDateString('ru-RU', { ...opts, year: 'numeric' })}`;
    }

    const fillDatesBtn = document.getElementById('adm-fill-dates-text');
    if (fillDatesBtn) fillDatesBtn.onclick = fillDatesTextFromCalendar;

    const btnSaveDates = document.getElementById('adm-save-dates');
    if (btnSaveDates) btnSaveDates.onclick = () => {
      const ds = document.getElementById('adm-cal-start')?.value?.trim() ?? '';
      const de = document.getElementById('adm-cal-end')?.value?.trim() ?? '';
      infobox.startDate = ds;
      infobox.endDate = de;
      infobox.dates = document.getElementById('adm-inf-dates')?.value?.trim() ?? infobox.dates;
      saveAll();
      renderTournamentBlock();
    };

    initPlayersForm();
    renderAdminTeamsList();
    syncAdminTeamFormEditState();
    const addBtn = document.getElementById('add-team-btn');
    if (addBtn) addBtn.onclick = addTeamFromForm;
    const cancelBtn = document.getElementById('cancel-team-edit');
    if (cancelBtn) cancelBtn.onclick = () => {
      editingTeamId = null;
      const b = document.getElementById('add-team-btn');
      if (b) b.textContent = 'Добавить';
      const c = document.getElementById('cancel-team-edit');
      if (c) c.style.display = 'none';
      const tn0 = document.getElementById('team-name');
      if (tn0) tn0.value = '';
      const no0 = document.getElementById('team-notice');
      if (no0) no0.value = '';
      for (let i = 1; i <= 5; i++) {
        const el = document.getElementById(`player-name-${i}`);
        if (el) el.value = '';
        const rs = document.getElementById(`player-role-${i}`);
        if (rs) rs.value = String(i);
      }
    };
    const btnResetTeams = document.getElementById('reset-default-teams');
    if (btnResetTeams) btnResetTeams.onclick = () => {
      teams = getDefaultTeams();
      matches = [];
      editingTeamId = null;
      bracketMeta = { size: 8, type: 'DE' };
      saveAll();
      renderEverything();
    };
    const btnGenBracket = document.getElementById('generate-bracket-btn');
    if (btnGenBracket) btnGenBracket.onclick = () => buildBracket();

    function orderedTeamsForFormatRebuild() {
      if (isSingleElimActive()) {
        const o = orderedTeamsFromSeRound0();
        if (o) return o;
        return teams.slice(0, bracketMeta.size);
      }
      return orderedTeamsFromCurrentUBQF() || teams.slice(0, 8);
    }

    ['format-ubqf', 'format-ubsf', 'format-ubf', 'format-lbr1', 'format-lbqf', 'format-lbsf', 'format-lbf', 'format-gf'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.onchange = e => {
        const key = id.replace('format-', '');
        formats[key] = parseInt(e.target.value, 10);
        saveAll();
        if (matches.length > 0 && !isSingleElimActive()) {
          const ord = orderedTeamsForFormatRebuild();
          matches = createEmptyBracket(ord);
          propagateAllMatches();
          saveAll();
          renderEverything();
        }
      };
    });
    const selSe = document.getElementById('format-se');
    if (selSe) selSe.onchange = e => {
      formats.se = parseInt(e.target.value, 10);
      saveAll();
      if (matches.length > 0 && isSingleElimActive()) {
        const ord = orderedTeamsForFormatRebuild();
        matches = createSingleElimBracket(ord);
        propagateBracket();
        saveAll();
        renderEverything();
      }
    };
  }

  function initPlayersForm() {
    const container = document.getElementById('players-container');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;gap:6px;margin-bottom:4px;width:100%';
      div.innerHTML = `<input type="text" id="player-name-${i}" placeholder="Игрок ${i}" style="flex:1;min-width:0"><select id="player-role-${i}" style="width:132px;font-size:0.72rem"><option value="1">1 — Carry</option><option value="2">2 — Mid</option><option value="3">3 — Offlane</option><option value="4">4 — Semi-support</option><option value="5">5 — Support</option></select>`;
      container.appendChild(div);
    }
  }

  function renderAdminTeamsList() {
    const container = document.getElementById('teams-list');
    if (!container) return;
    if (teams.length === 0) {
      container.innerHTML = '<div style="color:#666;font-size:0.8rem;">Нет команд</div>';
      return;
    }
    container.innerHTML = teams.map(t => `
      <div class="team-item">
        <span>${escapeHtml(t.name)} <span style="color:#666">(${t.players.length})</span></span>
        <span style="display:flex;gap:4px">
          <button type="button" class="ghost edit-team" data-id="${t.id}" style="padding:4px 8px;font-size:0.72rem">Правка</button>
          <button type="button" class="delete-team" data-id="${t.id}">✕</button>
        </span>
      </div>`).join('');
    container.querySelectorAll('.edit-team').forEach(btn => {
      btn.onclick = () => {
        const id = parseInt(btn.dataset.id, 10);
        const t = teams.find(x => x.id === id);
        if (!t) return;
        editingTeamId = id;
        const tn1 = document.getElementById('team-name');
        if (tn1) tn1.value = t.name || '';
        const no1 = document.getElementById('team-notice');
        if (no1) no1.value = t.notice || '';
        for (let i = 1; i <= 5; i++) {
          const pl = t.players[i - 1];
          const ni = document.getElementById(`player-name-${i}`);
          const ri = document.getElementById(`player-role-${i}`);
          if (ni) ni.value = pl?.name || '';
          if (ri) ri.value = String(pl?.role || i);
        }
        const ab = document.getElementById('add-team-btn');
        if (ab) ab.textContent = 'Сохранить команду';
        const cb = document.getElementById('cancel-team-edit');
        if (cb) cb.style.display = 'inline-block';
        adminDockActiveTab = 'teams';
        const d = document.getElementById('admin-dock');
        if (d && !d.classList.contains('hidden')) {
          d.querySelectorAll('.admin-tab').forEach(tt => tt.classList.toggle('active', tt.dataset.admTab === 'teams'));
          d.querySelectorAll('.admin-panel').forEach(pp => pp.classList.toggle('active', pp.dataset.admPanel === 'teams'));
        }
      };
    });
    container.querySelectorAll('.delete-team').forEach(btn => {
      btn.onclick = () => {
        const id = parseInt(btn.dataset.id, 10);
        teams = teams.filter(t => t.id !== id);
        if (editingTeamId === id) editingTeamId = null;
        matches = [];
        saveAll();
        renderEverything();
      };
    });
  }

  function addTeamFromForm() {
    const nameEl = document.getElementById('team-name');
    if (!nameEl) return;
    const name = nameEl.value.trim();
    if (!name) return alert('Введите название');
    const notice = document.getElementById('team-notice')?.value?.trim() ?? '';
    const players = [];
    for (let i = 1; i <= 5; i++) {
      const pname = document.getElementById(`player-name-${i}`)?.value?.trim();
      if (pname) {
        const roleSel = document.getElementById(`player-role-${i}`);
        const role = roleSel ? parseInt(roleSel.value, 10) || i : i;
        players.push({ name: pname, role });
      }
    }
    if (players.length === 0) players.push({ name: 'Player', role: 1 });
    if (editingTeamId != null) {
      const t = teams.find(x => x.id === editingTeamId);
      if (t) {
        t.name = name;
        t.players = players;
        t.notice = notice;
      }
      editingTeamId = null;
    } else {
      teams.push({ id: Date.now(), name, players, notice });
      matches = [];
    }
    saveAll();
    renderEverything();
    nameEl.value = '';
    const tn = document.getElementById('team-notice');
    if (tn) tn.value = '';
    const ab = document.getElementById('add-team-btn');
    if (ab) ab.textContent = 'Добавить';
    const cb = document.getElementById('cancel-team-edit');
    if (cb) cb.style.display = 'none';
    for (let i = 1; i <= 5; i++) {
      const el = document.getElementById(`player-name-${i}`);
      if (el) el.value = '';
      const rs = document.getElementById(`player-role-${i}`);
      if (rs) rs.value = String(i);
    }
  }

  function checkAuth() {
    isAdmin = sessionStorage.getItem('tournament_auth') === 'true';
    const authArea = document.getElementById('auth-area');
    if (!authArea) return;
    if (isAdmin) {
      authArea.innerHTML = `<span class="badge-admin">Админ</span><button type="button" class="ghost" id="logout-btn">Выйти</button>`;
      document.getElementById('logout-btn').onclick = () => {
        sessionStorage.removeItem('tournament_auth');
        location.reload();
      };
    } else {
      authArea.innerHTML = `<button type="button" class="ghost" id="login-btn">Вход админа</button>`;
      document.getElementById('login-btn').onclick = () => {
        const pwd = prompt('Пароль:');
        if (pwd === ADMIN_PASSWORD) {
          sessionStorage.setItem('tournament_auth', 'true');
          location.reload();
        } else alert('Неверно');
      };
    }
  }

  function renderEverything() {
    try { renderTournamentBlock(); } catch (e) { console.error('renderTournamentBlock', e); }
    try { renderTeamsWiki(); } catch (e) { console.error('renderTeamsWiki', e); }
    try { renderBracketGrid(); } catch (e) { console.error('renderBracketGrid', e); }
    try {
      if (scheduleMode) renderSchedule();
    } catch (e) { console.error('renderSchedule', e); }
    try { renderAdminDock(); } catch (e) { console.error('renderAdminDock', e); }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadAll();
    checkAuth();
    initSidebarContextMenu();
    renderEverything();

    document.getElementById('btn-schedule').addEventListener('click', () => {
      setScheduleMode(!scheduleMode);
    });

    let resizeT;
    window.addEventListener('resize', () => {
      clearTimeout(resizeT);
      resizeT = setTimeout(() => { if (!scheduleMode) drawBracketLines(); }, 80);
    });
  });
</script>
</body>
</html>
